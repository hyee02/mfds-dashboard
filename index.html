<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식약처 신규 품목제조보고 대시보드</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --surface-2: #ffffff;
    --surface-1: #f5f4f0;
    --surface-0: #ececE6;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem;
    background: var(--surface-0);
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--text-primary);
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; }
  .top-row .title { font-size: 18px; font-weight: 500; }
  .top-row .range { font-size: 13px; color: var(--text-secondary); }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .kpi-card { border-radius: var(--radius); padding: 1rem; }
  .kpi-label { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 13px; }
  .kpi-value { font-size: 24px; font-weight: 500; margin: 0; }
  .chart-wrap { position: relative; width: 100%; height: 140px; margin-bottom: 1.75rem; background: var(--surface-2); border-radius: 12px; padding: 12px; border: 0.5px solid var(--border); }
  .section-list { display: flex; flex-direction: column; gap: 12px; }
  .section-card { background: var(--surface-2); border: 0.5px solid var(--border); border-left: 3px solid; border-radius: 12px; padding: 1rem 1.25rem; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-head-left { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
  .badge { font-size: 12px; padding: 2px 10px; border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  table td { padding: 4px 0; }
  table tr:first-child { color: var(--text-secondary); }
  table td:nth-child(1) { width: 60px; color: var(--text-muted); }
  table td:nth-child(2) { width: 160px; color: var(--text-secondary); }
  .footer { font-size: 12px; color: var(--text-muted); margin-top: 1.25rem; }
  .refresh-note { font-size: 12px; color: var(--text-muted); margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <span class="title">식약처 신규 품목제조보고</span>
    <span class="range" id="range"></span>
  </div>
  <div class="refresh-note">이 페이지는 새로고침(F5)하면 data.json의 최신 내용을 다시 불러옵니다.</div>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="chart-wrap">
    <canvas id="catChart" role="img" aria-label="카테고리별 신규 보고 건수 막대그래프"></canvas>
  </div>

  <div class="section-list" id="sections"></div>

  <p class="footer" id="footer"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATS = [
  { key: 'seafood',   label: '수산물',    icon: 'ti-fish',  color: '#1D9E75', bg: '#E1F5EE', text: '#085041', textDark: '#04342C' },
  { key: 'processed', label: '가공식품',  icon: 'ti-box',   color: '#D85A30', bg: '#FAECE7', text: '#712B13', textDark: '#4A1B0C' },
  { key: 'produce',   label: '야채/과일', icon: 'ti-apple', color: '#7F77DD', bg: '#EEEDFE', text: '#3C3489', textDark: '#26215C' }
];

fetch('data.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => render(data))
  .catch(err => {
    document.getElementById('sections').innerHTML = '<p style="color:#993C1D;">데이터 로드 실패: ' + err.message + '</p>';
  });

function render(data) {
  document.getElementById('range').textContent = data.dateRange;

  const kpiGrid = document.getElementById('kpiGrid');
  let kpiHtml = '';
  CATS.forEach(c => {
    const n = data.counts[c.key] || 0;
    kpiHtml += `<div class="kpi-card" style="background:${c.bg};">
      <div class="kpi-label" style="color:${c.text};"><i class="ti ${c.icon}" style="font-size:16px;"></i>${c.label}</div>
      <p class="kpi-value" style="color:${c.textDark};">${n}</p>
    </div>`;
  });
  kpiHtml += `<div class="kpi-card" style="background:var(--surface-2); border:0.5px solid var(--border);">
    <div class="kpi-label" style="color:var(--text-secondary);"><i class="ti ti-sum" style="font-size:16px;"></i>합계</div>
    <p class="kpi-value">${data.total}</p>
  </div>`;
  kpiGrid.innerHTML = kpiHtml;

  new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: {
      labels: CATS.map(c => c.label),
      datasets: [{ data: CATS.map(c => data.counts[c.key] || 0), backgroundColor: CATS.map(c => c.color), borderRadius: 4, maxBarThickness: 40 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#898781' } },
        y: { grid: { display: false }, ticks: { color: '#52514e', font: { size: 12 } } }
      }
    }
  });

  const sections = document.getElementById('sections');
  let sHtml = '';
  CATS.forEach(c => {
    const items = (data.samples[c.key] || []);
    let rows = '<tr><td>보고일</td><td>업소명</td><td>제품명</td></tr>';
    items.forEach(it => {
      rows += `<tr><td>${it.date}</td><td>${it.company}</td><td>${it.name}</td></tr>`;
    });
    sHtml += `<div class="section-card" style="border-left-color:${c.color};">
      <div class="section-head">
        <div class="section-head-left"><i class="ti ${c.icon}" style="font-size:18px; color:${c.text};"></i>${c.label}</div>
        <span class="badge" style="background:${c.bg}; color:${c.text};">${data.counts[c.key] || 0}건</span>
      </div>
      <table>${rows}</table>
    </div>`;
  });
  sections.innerHTML = sHtml;

  document.getElementById('footer').textContent = `${data.csvNote || ''} · 생성 시각: ${new Date(data.generatedAt).toLocaleString('ko-KR')}`;
}
</script>
</body>
</html>
